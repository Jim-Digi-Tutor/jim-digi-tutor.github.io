<!DOCTYPE html>
<html>

  <head>

    <title>Digi-Stuff (www.digi-stuff.co.uk)</title>

    <link rel="stylesheet" type="text/css" href="../global-assets/css/common.css">
    <link rel="stylesheet" type="text/css" href="../global-assets/css/index-pages.css">
    <link rel="stylesheet" type="text/css" href="../global-assets/css/supplementary.css">

    <script type="text/javascript" src="../global-assets/js/common.js"></script>

    <script type="text/javascript">

      let title = { title: "Digital Functional Skills", subTitle: "Resources for Digital Learning" };
      let headerConfig = { changeScheme: true, homeButton: true, homeLink: "../index.html", restartButton: false };
      let footerConfig = { backButton: null, backText: null, nextButton: null, nextText: null };
      
      function init() {

        let footerContainers = [
          document.getElementById("footer-0"),
          document.getElementById("footer-1"),
          document.getElementById("footer-2")
        ];

        buildHeaderTitle(title);
        buildHeaderOptions(document.getElementById("header-options"), headerConfig);
        buildFooter(footerContainers, footerConfig);
      }

    </script>

  </head>

  <body onload="init();">

    <div class="container container-console">

      <header id="header">

        <h3 id="sub-title" class="dark-grey"></h3>
        <h1 id="title" class="uppercase"></h1>

      </header>

      <div id="header-options" class="header-options"></div>

      <div class="full-width-content-container">

        <div class="topic-container">
          <p class="topic-heading">Jim's Computer</p>
          <p class="topic-description">
            You can downloads the <span class="nc-purple bold">Jim's Computer</span> .zip file by clicking <a href="files\jims-computer.zip" download>here</a>
          </p>
        </div>
              
      </div>

      <footer id="footer">
        <div id="footer-0" class="footer-0"></div>
        <div id="footer-1" class="footer-1"></div>
        <div id="footer-2" class="footer-2"></div>
      </footer>

    </div>

  </body>

</html>
